name: Publish Content

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: dev-roadmaps-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build content artifacts
        run: npm run build:artifacts
        env:
          DEVPOLARIS_CONTENT_VERSION: ${{ github.sha }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  revalidate:
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEVPOLARIS_REVALIDATE_WEBHOOK_URL: ${{ secrets.DEVPOLARIS_REVALIDATE_WEBHOOK_URL }}
      DEVPOLARIS_REVALIDATE_WEBHOOK_SECRET: ${{ secrets.DEVPOLARIS_REVALIDATE_WEBHOOK_SECRET }}
      DEVPOLARIS_CONTENT_VERSION: ${{ github.sha }}
      DEVPOLARIS_CONTENT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Send signed revalidation webhook
        if: ${{ env.DEVPOLARIS_REVALIDATE_WEBHOOK_URL != '' && env.DEVPOLARIS_REVALIDATE_WEBHOOK_SECRET != '' }}
        shell: bash
        run: |
          set -euo pipefail

          case "$DEVPOLARIS_REVALIDATE_WEBHOOK_URL" in
            http://*|https://*) ;;
            *)
              echo "DEVPOLARIS_REVALIDATE_WEBHOOK_URL must start with http:// or https://" >&2
              exit 64
              ;;
          esac

          timestamp="$(date +%s)"
          payload="$(node -e 'process.stdout.write(JSON.stringify({source:"dev-roadmaps",version:process.env.DEVPOLARIS_CONTENT_VERSION,generatedAt:new Date().toISOString(),baseUrl:process.env.DEVPOLARIS_CONTENT_BASE_URL}))')"
          signature="$(node -e 'const crypto=require("crypto"); const payload=process.argv[1]; const timestamp=process.argv[2]; process.stdout.write("sha256="+crypto.createHmac("sha256", process.env.DEVPOLARIS_REVALIDATE_WEBHOOK_SECRET).update(timestamp + "." + payload).digest("hex"))' "$payload" "$timestamp")"

          echo "Sending revalidation webhook to $DEVPOLARIS_REVALIDATE_WEBHOOK_URL"

          response_file="$(mktemp)"
          http_status="000"
          if ! http_status="$(curl --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 2 \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST "$DEVPOLARIS_REVALIDATE_WEBHOOK_URL" \
            --header "content-type: application/json" \
            --header "x-devpolaris-timestamp: $timestamp" \
            --header "x-devpolaris-signature: $signature" \
            --data "$payload")"; then
            echo "::warning::Revalidation webhook request failed before receiving an HTTP response. Content was still published."
            rm -f "$response_file"
            exit 0
          fi

          if [[ "$http_status" -lt 200 || "$http_status" -ge 300 ]]; then
            echo "::warning::Revalidation webhook returned HTTP $http_status. Content was still published."
            if [[ -s "$response_file" ]]; then
              sed 's/^/webhook: /' "$response_file"
            fi
            rm -f "$response_file"
            exit 0
          fi

          cat "$response_file"
          rm -f "$response_file"
